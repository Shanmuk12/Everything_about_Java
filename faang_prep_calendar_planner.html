
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
--glass:rgba(255,255,255,0.07);
--glass-border:rgba(255,255,255,0.13);
--glass-hover:rgba(255,255,255,0.13);
--accent1:#6C63FF;
--accent2:#00D4AA;
--accent3:#FF6B6B;
--accent4:#FFB347;
--accent5:#4FC3F7;
--accent6:#CE93D8;
--bg:#0A0A14;
--surface:#10101E;
--text:#E8E8F0;
--muted:#7A7A9A;
--tag-dsa:rgba(108,99,255,0.25);
--tag-java:rgba(0,212,170,0.25);
--tag-spring:rgba(78,205,121,0.25);
--tag-gate:rgba(255,179,71,0.25);
--tag-hld:rgba(79,195,247,0.25);
--tag-lld:rgba(206,147,216,0.25);
--tag-interview:rgba(255,107,107,0.25);
--tag-project:rgba(255,152,0,0.25);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#app{max-width:1100px;margin:0 auto;padding:16px 12px}
.header{text-align:center;margin-bottom:24px;padding:20px}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;background:linear-gradient(135deg,#6C63FF,#00D4AA,#4FC3F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header p{color:var(--muted);font-size:13px}
.progress-bar-section{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin-bottom:20px}
.progress-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.tracks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.track{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.07)}
.track-name{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.track-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.track-bar-bg{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:5px}
.track-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.track-pct{font-size:11px;font-weight:600;color:var(--text)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.nav-btn{background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:var(--text);border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.nav-btn:hover{background:rgba(255,255,255,0.12)}
.month-label{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.today-btn{background:linear-gradient(135deg,rgba(108,99,255,0.3),rgba(0,212,170,0.2));border:1px solid rgba(108,99,255,0.4);color:#A8A3FF;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.day-header{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:8px 4px;text-transform:uppercase;letter-spacing:0.5px}
.day-cell{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;min-height:72px;padding:7px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.day-cell:hover{background:rgba(255,255,255,0.09);border-color:rgba(108,99,255,0.4);transform:translateY(-1px)}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.day-cell.today{border-color:var(--accent1);background:rgba(108,99,255,0.1)}
.day-cell.today .day-num{color:#A8A3FF;font-weight:700}
.day-cell.has-tasks{border-color:rgba(0,212,170,0.25)}
.day-cell.weekend{background:rgba(255,255,255,0.02)}
.day-cell.past{opacity:0.5}
.day-num{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.task-chips{display:flex;flex-wrap:wrap;gap:2px}
.chip{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.chip.done{opacity:0.4;text-decoration:line-through}
.day-progress{position:absolute;bottom:4px;right:5px;font-size:9px;color:var(--muted)}
.day-count{font-size:9px;color:var(--muted);margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#13132A;border:1px solid rgba(108,99,255,0.3);border-radius:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:22px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-date{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.modal-day-tag{font-size:11px;color:var(--accent2);background:rgba(0,212,170,0.1);padding:3px 8px;border-radius:6px;margin-top:4px;display:inline-block}
.close-btn{background:rgba(255,255,255,0.08);border:none;color:var(--muted);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:rgba(255,255,255,0.15);color:var(--text)}
.tasks-list{margin-bottom:16px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);transition:all 0.2s}
.task-item.completed{opacity:0.45}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.2s;background:transparent}
.task-check.checked{background:var(--accent2);border-color:var(--accent2)}
.task-check.checked::after{content:'✓';color:#000;font-size:11px;font-weight:700}
.task-text{flex:1;font-size:13px;color:var(--text);cursor:pointer;line-height:1.4}
.task-item.completed .task-text{text-decoration:line-through;color:var(--muted)}
.task-tag-badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;flex-shrink:0}
.task-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 3px;line-height:1;opacity:0;transition:opacity 0.2s}
.task-item:hover .task-del{opacity:1}
.add-task-area{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px}
.add-task-title{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:500}
.quick-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.qtag{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;font-weight:500}
.qtag.sel{border-color:rgba(255,255,255,0.3);transform:scale(1.05)}
.add-input-row{display:flex;gap:8px}
.add-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none}
.add-input:focus{border-color:rgba(108,99,255,0.5)}
.add-btn{background:linear-gradient(135deg,#6C63FF,#4FC3F7);border:none;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:opacity 0.2s}
.add-btn:hover{opacity:0.85}
.suggested-tasks{margin-top:12px}
.sugg-title{font-size:11px;color:var(--muted);margin-bottom:8px}
.sugg-chips{display:flex;flex-wrap:wrap;gap:6px}
.sugg-chip{font-size:11px;padding:4px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;cursor:pointer;color:var(--muted);transition:all 0.2s}
.sugg-chip:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.no-tasks{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.day-cell.all-done{border-color:rgba(0,212,170,0.5)}
.all-done-glow{position:absolute;top:4px;right:5px;width:6px;height:6px;background:var(--accent2);border-radius:50%}
</style>

<div id="app">
<div class="header">
<h1>FAANG Prep Planner</h1>
<p>7 PM – 2 AM Weekdays • Full Weekends • Every task counts</p>
</div>
<div class="progress-bar-section">
<div class="progress-title">Overall Progress</div>
<div class="tracks" id="tracks-container"></div>
</div>
<div class="nav-row">
<button class="nav-btn" id="prev-btn">← Prev</button>
<span class="month-label" id="month-label"></span>
<button class="today-btn" id="today-btn">Today</button>
<button class="nav-btn" id="next-btn">Next →</button>
</div>
<div class="cal-grid" id="cal-grid"></div>
</div>
<div class="modal-overlay" id="modal" style="display:none">
<div class="modal" id="modal-content"></div>
</div>

<script>
const TRACKS=[
{id:'dsa',label:'DSA in Java',color:'#6C63FF',bg:'rgba(108,99,255,0.25)'},
{id:'java',label:'Java Deep Dive',color:'#00D4AA',bg:'rgba(0,212,170,0.25)'},
{id:'spring',label:'Spring Boot',color:'#4ade80',bg:'rgba(74,222,128,0.25)'},
{id:'gate',label:'GATE Classes',color:'#FFB347',bg:'rgba(255,179,71,0.25)'},
{id:'hld',label:'HLD Design',color:'#4FC3F7',bg:'rgba(79,195,247,0.25)'},
{id:'lld',label:'LLD Design',color:'#CE93D8',bg:'rgba(206,147,216,0.25)'},
{id:'interview',label:'Interview Prep',color:'#FF6B6B',bg:'rgba(255,107,107,0.25)'},
{id:'project',label:'Project Work',color:'#FF9800',bg:'rgba(255,152,0,0.25)'}
];

const SUGGESTIONS={
dsa:['Arrays & Strings','Linked List problems','Binary Trees','DP patterns','Graph BFS/DFS','Stack & Queue','Sliding Window','Two Pointers','Backtracking','Heaps & PQ'],
java:['OOP deep dive','Generics & Collections','Multithreading','Streams & Lambdas','JVM internals','Design Patterns','Exception handling','Java 17 features','Concurrency utils','Functional interfaces'],
spring:['Spring Boot setup','REST API build','Spring Security','JPA & Hibernate','Microservices intro','Spring Cloud','Caching layer','Testing with MockMVC','Docker + Spring','CI/CD pipeline'],
gate:['Algorithms complexity','OS concepts','DBMS theory','CN fundamentals','Discrete maths','Compiler design','COA revision','Graph theory','Aptitude practice','Previous year papers'],
hld:['URL Shortener design','Twitter system design','Consistent hashing','CAP theorem','Load balancers','DB sharding','Message queues','CDN & caching','Rate limiting','Distributed systems'],
lld:['LRU Cache impl','Parking lot OOP','Elevator system','BookMyShow LLD','Design patterns','Observer pattern','Factory pattern','SOLID principles','TDD practice','Chess game design'],
interview:['Resume tailoring','Behavioral STAR answers','Mock coding round','System design mock','HR round prep','LinkedIn optimization','Cold email outreach','Salary negotiation','Company research','Portfolio projects'],
project:['Choose project idea','DB schema design','Backend API build','Frontend setup','Auth integration','Feature sprint 1','Feature sprint 2','Testing & bug fixes','Deploy to cloud','Create case study']
};

const now=new Date();
const START_DATE=new Date(now.getFullYear(),now.getMonth(),1);
const END_MONTH=new Date(now.getFullYear(),now.getMonth()+12,0);

let viewMonth=now.getMonth();
let viewYear=now.getFullYear();
let tasks=JSON.parse(localStorage.getItem('faang_tasks')||'{}');
let openDate=null;
let selTag=null;

function saveData(){
try{localStorage.setItem('faang_tasks',JSON.stringify(tasks));}catch(e){}
}

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function getTrackProgress(){
let counts={};
let dones={};
TRACKS.forEach(t=>{counts[t.id]=0;dones[t.id]=0;});
Object.values(tasks).forEach(dayTasks=>{
(dayTasks||[]).forEach(t=>{
if(counts[t.tag]!==undefined){
counts[t.tag]++;
if(t.done)dones[t.tag]++;
}
});
});
return TRACKS.map(t=>({...t,total:counts[t.id],done:dones[t.id],pct:counts[t.id]?Math.round(dones[t.id]/counts[t.id]*100):0}));
}

function renderTracks(){
const cont=document.getElementById('tracks-container');
if(!cont)return;
const prog=getTrackProgress();
cont.innerHTML=prog.map(t=>`
<div class="track">
<div class="track-name"><div class="track-dot" style="background:${t.color}"></div>${t.label}</div>
<div class="track-bar-bg"><div class="track-bar-fill" style="width:${t.pct}%;background:${t.color}"></div></div>
<div class="track-pct">${t.pct}% <span style="color:var(--muted);font-weight:400;font-size:10px">${t.done}/${t.total}</span></div>
</div>`).join('');
}

function renderCalendar(){
const label=document.getElementById('month-label');
const grid=document.getElementById('cal-grid');
if(!label||!grid)return;
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
label.textContent=`${months[viewMonth]} ${viewYear}`;
const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let html=days.map(d=>`<div class="day-header">${d}</div>`).join('');
const first=new Date(viewYear,viewMonth,1).getDay();
const total=new Date(viewYear,viewMonth+1,0).getDate();
for(let i=0;i<first;i++)html+=`<div class="day-cell empty"></div>`;
const todayStr=dateKey(now.getFullYear(),now.getMonth(),now.getDate());
for(let d=1;d<=total;d++){
const key=dateKey(viewYear,viewMonth,d);
const dayTasks=tasks[key]||[];
const dow=(first+d-1)%7;
const isWeekend=(dow===0||dow===6);
const isToday=key===todayStr;
const isPast=new Date(viewYear,viewMonth,d)<new Date(now.getFullYear(),now.getMonth(),now.getDate());
const hasTasks=dayTasks.length>0;
const allDone=hasTasks&&dayTasks.every(t=>t.done);
let cls='day-cell';
if(isToday)cls+=' today';
if(isWeekend)cls+=' weekend';
if(isPast&&!isToday)cls+=' past';
if(hasTasks)cls+=' has-tasks';
if(allDone)cls+=' all-done';
const shownTasks=dayTasks.slice(0,3);
const chips=shownTasks.map(t=>{
const tr=TRACKS.find(x=>x.id===t.tag)||{color:'#888',bg:'rgba(136,136,136,0.2)'};
return `<div class="chip${t.done?' done':''}" style="background:${tr.bg};color:${tr.color}">${t.text.substring(0,10)}</div>`;
}).join('');
const extra=dayTasks.length>3?`<div class="day-count">+${dayTasks.length-3} more</div>`:'';
html+=`<div class="${cls}" onclick="openModal('${key}')">
${allDone?'<div class="all-done-glow"></div>':''}
<div class="day-num">${d}</div>
<div class="task-chips">${chips}</div>
${extra}
</div>`;
}
grid.innerHTML=html;
}

function openModal(key){
openDate=key;
const [y,m,d]=key.split('-').map(Number);
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const dateObj=new Date(y,m-1,d);
const dow=days[dateObj.getDay()];
const isWeekend=(dateObj.getDay()===0||dateObj.getDay()===6);
const timeNote=isWeekend?'Full day free':'7 PM – 2 AM';
const dayTasks=tasks[key]||[];
const tr=TRACKS.find(x=>x.id==(selTag||'dsa'));
const modal=document.getElementById('modal');
const mc=document.getElementById('modal-content');
const completedCount=dayTasks.filter(t=>t.done).length;
mc.innerHTML=`
<div class="modal-header">
<div>
<div class="modal-date">${dow}, ${months[m-1]} ${d}, ${y}</div>
<div class="modal-day-tag">${timeNote} · ${completedCount}/${dayTasks.length} done</div>
</div>
<button class="close-btn" onclick="closeModal()">×</button>
</div>
<div class="tasks-list" id="tasks-list">${renderTasksList(key)}</div>
<div class="add-task-area">
<div class="add-task-title">Add Task</div>
<div class="quick-tags" id="quick-tags">
${TRACKS.map(t=>`<button class="qtag${selTag===t.id?' sel':''}" style="background:${t.bg};color:${t.color};border-color:${selTag===t.id?t.color:'transparent'}" onclick="selectTag('${t.id}')">${t.label}</button>`).join('')}
</div>
<div class="add-input-row">
<input class="add-input" id="task-input" placeholder="What will you study..." onkeydown="if(event.key==='Enter')addTask()">
<button class="add-btn" onclick="addTask()">Add</button>
</div>
<div class="suggested-tasks" id="suggested-tasks">${renderSuggestions()}</div>
</div>`;
modal.style.display='flex';
setTimeout(()=>{const inp=document.getElementById('task-input');if(inp)inp.focus();},100);
}

function renderTasksList(key){
const dayTasks=tasks[key]||[];
if(!dayTasks.length)return `<div class="no-tasks">No tasks yet — add some below!</div>`;
return dayTasks.map((t,i)=>{
const tr=TRACKS.find(x=>x.id===t.tag)||{color:'#888',bg:'rgba(136,136,136,0.2)',label:'Other'};
return `<div class="task-item${t.done?' completed':''}">
<div class="task-check${t.done?' checked':''}" onclick="toggleTask('${key}',${i})"></div>
<div class="task-text" onclick="toggleTask('${key}',${i})">${t.text}</div>
<span class="task-tag-badge" style="background:${tr.bg};color:${tr.color}">${tr.label}</span>
<button class="task-del" onclick="deleteTask('${key}',${i})" title="Remove">×</button>
</div>`;
}).join('');
}

function renderSuggestions(){
const tag=selTag||'dsa';
const sugg=SUGGESTIONS[tag]||[];
return `<div class="sugg-title">Quick add for ${TRACKS.find(t=>t.id===tag)?.label||tag}:</div>
<div class="sugg-chips">${sugg.map(s=>`<div class="sugg-chip" onclick="addSuggestion('${s.replace(/'/g,"\\'")}')">+ ${s}</div>`).join('')}</div>`;
}

function selectTag(id){
selTag=id;
const qt=document.getElementById('quick-tags');
const st=document.getElementById('suggested-tasks');
if(qt){
qt.innerHTML=TRACKS.map(t=>`<button class="qtag${selTag===t.id?' sel':''}" style="background:${t.bg};color:${t.color};border-color:${selTag===t.id?t.color:'transparent'}" onclick="selectTag('${t.id}')">${t.label}</button>`).join('');
}
if(st)st.innerHTML=renderSuggestions();
}

function addSuggestion(text){
const inp=document.getElementById('task-input');
if(inp)inp.value=text;
addTask();
}

function addTask(){
const inp=document.getElementById('task-input');
if(!inp)return;
const text=inp.value.trim();
if(!text)return;
const tag=selTag||'dsa';
if(!tasks[openDate])tasks[openDate]=[];
tasks[openDate].push({text,tag,done:false,id:Date.now()});
saveData();
inp.value='';
document.getElementById('tasks-list').innerHTML=renderTasksList(openDate);
renderCalendar();
renderTracks();
}

function toggleTask(key,idx){
if(!tasks[key])return;
tasks[key][idx].done=!tasks[key][idx].done;
saveData();
document.getElementById('tasks-list').innerHTML=renderTasksList(key);
const hdr=document.querySelector('.modal-day-tag');
if(hdr){
const dayTasks=tasks[key]||[];
const completedCount=dayTasks.filter(t=>t.done).length;
const isWeekend=(new Date(key).getDay()===0||new Date(key).getDay()===6);
hdr.textContent=`${isWeekend?'Full day free':'7 PM – 2 AM'} · ${completedCount}/${dayTasks.length} done`;
}
renderCalendar();
renderTracks();
}

function deleteTask(key,idx){
if(!tasks[key])return;
tasks[key].splice(idx,1);
saveData();
document.getElementById('tasks-list').innerHTML=renderTasksList(key);
renderCalendar();
renderTracks();
}

function closeModal(){
document.getElementById('modal').style.display='none';
openDate=null;
}

document.getElementById('prev-btn').onclick=()=>{
viewMonth--;
if(viewMonth<0){viewMonth=11;viewYear--;}
renderCalendar();
};
document.getElementById('next-btn').onclick=()=>{
viewMonth++;
if(viewMonth>11){viewMonth=0;viewYear++;}
renderCalendar();
};
document.getElementById('today-btn').onclick=()=>{
viewMonth=now.getMonth();viewYear=now.getFullYear();renderCalendar();
};
document.getElementById('modal').onclick=function(e){
if(e.target===this)closeModal();
};

selTag='dsa';
renderTracks();
renderCalendar();
</script>
